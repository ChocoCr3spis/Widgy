<ion-tabs>
  <ion-header class="line">
    <ion-toolbar>
      <div class="header">
        <ion-title>
          <span *ngIf="user$ | async as user;" class="title">
              <p class="welcome">Welcome </p>@{{ user.username }}
          </span>
        </ion-title>
        <ion-avatar class="profile-img">
          <img alt="Silhouette of a person's head" src="../../../assets/profile/default_profile_image.jpeg" />
        </ion-avatar> 
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-tab-bar slot="top" class="test">
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon name="grid"></ion-icon>
      <ion-label>Mis widgets</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon name="person-add"></ion-icon>
      <ion-label>Compartido conmigo</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon name="search"></ion-icon>
      <ion-label>Widgets públicos</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

</ion-tabs>
